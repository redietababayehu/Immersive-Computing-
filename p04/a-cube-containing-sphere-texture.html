<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img
          id="mars"
          src="./IMAGES/mars-surface.avif"
          crossorigin="anonymous"
        />
      </a-assets>

      <a-sphere
        id="PGB-sphere-1"
        position="-2 2 -5.5"
        radius="1"
        color="blue"
      ></a-sphere>

      <a-sphere
        id="PGB-sphere-2"
        radius="0.5"
        position="0 2 -5.5"
        src="#mars"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"
      ></a-sphere>

      <a-box
        id="PGB-Box"
        position="0 2 -5.5"
        material="transparent: true; opacity: 0.5; wireframe: true"
        color="white"
      ></a-box>

      <a-sky color="#000"></a-sky>
    </a-scene>
  </body>
</html>
