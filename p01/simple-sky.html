<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <!-- <script src="../js/aframe.min.js"></script> -->
  </head>
  <body>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const src = "./IMAGES/360_sky.jpg";

        const img = document.getElementById("nebula");
        img.setAttribute("src", src);

        document.querySelector("a-assets").addEventListener("loaded", () => {
          document
            .getElementById("mySky")
            .setAttribute("material", "src: #nebula");
        });
      });
    </script>
    <a-scene>
      <a-assets>
        <img id="nebula" crossorigin="anonymous" />
      </a-assets>

      <a-sky id="mySky" src="#nebula" position="-2.5  0 -1.5"></a-sky>
      <a-text
        font="kelsonsans"
        color="#FFFFFF"
        value="Woohoo!!"
        width="6"
        position="0 -3 -6"
      ></a-text>
    </a-scene>
  </body>
</html>
